version: 0.1
os: linux

# AWS CodeDeploy Application Specification
files:
  - source: /
    destination: /home/ubuntu/fastfood-app

permissions:
  - object: /home/ubuntu/fastfood-app
    pattern: "**"
    owner: ubuntu
    group: ubuntu
    mode: 644      # files default to 644
    type:
      - file
  - object: /home/ubuntu/fastfood-app
    pattern: "**"
    owner: ubuntu
    group: ubuntu
    mode: 755      # directories default to 755
    type:
      - directory

hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root
      
  ApplicationStop:
    - location: scripts/stop_application.sh
      timeout: 120
      runas: ubuntu
      
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 300
      runas: ubuntu
      
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: ubuntu
